# compose.yaml — PRODUCTION deployment of the io.telepat.snoopy Pilot node (FREE).
#
#   provider-daemon    pilot-daemon (no_skillinject) + app-store supervisor, which
#                      spawns io.telepat.snoopy from the signed bundle and registers
#                      on the Pilot overlay so callers can reach the capability on
#                      dataexchange :1001. The supervised app spawns `snoopy mcp`
#                      (stdio) co-located in this same container.
#
# USAGE: cp .env.example .env  (fill it in)  →  docker compose up -d
# For the local zero-LLM smoke, use compose.smoke.yaml instead.
#
# The pilot image is the no_skillinject build and HOME is the container-local
# /home/pilot; no host path is mounted into the service. This network needs
# egress: op:"qualify" scans Reddit public JSON and calls OpenRouter, and the
# daemon must reach the Pilot overlay.
#
# Prereq: build the images + libpilot.so + signed bundle first (host-safe, all
# compilation happens inside docker/*.Dockerfile):  scripts/build.sh
name: snoopy

volumes:
  pilot-state:   # provider identity + app-store install root (.pilot/apps) + snoopy state — persistent

services:

  provider-daemon:
    image: pilot-protocol/snoopy-runtime:dev
    entrypoint: ["/scripts/provider-entrypoint.sh"]
    environment:
      HOME: /home/pilot
      PILOT_SOCKET: /home/pilot/run/pilot.sock
      IDENTITY_PATH: /home/pilot/.pilot/identity.json
      HOSTNAME_PILOT: ${PILOT_HOSTNAME:-snoopy-provider}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # Pilot overlay endpoints — default to the real Pilot network so callers can
      # reach the node. Override in .env to point at a self-hosted rendezvous.
      RENDEZVOUS_REGISTRY: ${PILOT_REGISTRY:-34.71.57.205:9000}
      RENDEZVOUS_BEACON: ${PILOT_BEACON:-34.71.57.205:9001}
      APP_BUNDLE: /bundles/io.telepat.snoopy
      PILOT_LIB_PATH: /opt/libpilot.so
      SNOOPY_ROOT_DIR: /home/pilot/.pilot/snoopy
      # Model settings — seeded into Snoopy's SQLite by the wrapper at startup.
      SNOOPY_MODEL: ${SNOOPY_MODEL:-deepseek/deepseek-v4-flash}
      SNOOPY_TEMPERATURE: ${SNOOPY_TEMPERATURE:-0.3}
      SNOOPY_MAX_TOKENS: ${SNOOPY_MAX_TOKENS:-800}
      SNOOPY_TOP_P: ${SNOOPY_TOP_P:-1}
      # Required for op:"qualify" (the LLM path). Snoopy reads this env directly.
      TELEPAT_OPENROUTER_KEY: ${TELEPAT_OPENROUTER_KEY:?set TELEPAT_OPENROUTER_KEY in .env}
      # Optional default monitoring job (seeded only if no jobs exist yet).
      SNOOPY_DEFAULT_JOB_NAME: ${SNOOPY_DEFAULT_JOB_NAME:-}
      SNOOPY_DEFAULT_SUBREDDITS: ${SNOOPY_DEFAULT_SUBREDDITS:-}
      SNOOPY_DEFAULT_PROMPT: ${SNOOPY_DEFAULT_PROMPT:-}
      # Reddit OAuth (OPTIONAL — dormant unless set). Enables authenticated scans
      # where Reddit blocks unauthenticated datacenter IPs (HTTP 403). client_id +
      # app_name are seeded into Snoopy's settings DB by the entrypoint; the secret
      # is read directly by `snoopy mcp` from this env var.
      SNOOPY_REDDIT_CLIENT_ID: ${SNOOPY_REDDIT_CLIENT_ID:-}
      SNOOPY_REDDIT_APP_NAME: ${SNOOPY_REDDIT_APP_NAME:-}
      SNOOPY_REDDIT_CLIENT_SECRET: ${SNOOPY_REDDIT_CLIENT_SECRET:-}
    volumes:
      - ./bundles:/bundles:ro
      - ./scripts:/scripts:ro
      - ./build/libpilot.so:/opt/libpilot.so:ro
      - pilot-state:/home/pilot/.pilot
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "test -S /home/pilot/.pilot/apps/io.telepat.snoopy/app.sock"]
      interval: 5s
      timeout: 3s
      retries: 50
      start_period: 15s
